<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Friendship · Rachita</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .bg-wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bodoni Moda',serif;font-style:italic;font-weight:900;font-size:clamp(7rem,22vw,18rem);color:rgba(232,165,152,0.03);white-space:nowrap;pointer-events:none;z-index:0;user-select:none;letter-spacing:-0.02em}
    .fr-text-side{opacity:0;transform:translateX(-40px);animation:slideInL 1s var(--ease-expo) forwards 0.4s}
    @keyframes slideInL{to{opacity:1;transform:translateX(0)}}
    .fr-photos .f-photo:nth-child(1){height:360px}
    .fr-photos .f-photo:nth-child(2),.fr-photos .f-photo:nth-child(3){height:170px}
    @media(max-width:768px){.fr-photos .f-photo{height:200px!important}}
  </style>
</head>
<body>
  <div class="bg-wm">Friends</div>
  <div class="aurora"><div class="a-orb a1"></div><div class="a-orb a2"></div><div class="a-orb a3"></div></div>
  <canvas class="particles-canvas" id="particleCanvas"></canvas>
  <div class="star-field"></div>
  <p class="page-num">12 · 16</p>

  <div class="page-wrap friendship-page">
    <div class="fr-grid">
      <div class="fr-text-side">
        <div class="s-label">A bond like no other</div>
        <blockquote class="fr-quote">
          <span class="fr-qmark">"</span>Some people enter our lives and change everything. You came into my life and made ordinary days unforgettable.
        </blockquote>
        <p class="fr-byline">— written with love, for Rachita</p>
        <div class="g-line" style="margin-left:0;margin-right:auto"></div>
        <button class="btn" data-nav="childhood.html">
          <span>Next Memory</span><span class="arr">→</span>
        </button>
      </div>
      <div class="fr-photos" style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:10px">
        <div class="f-photo" style="grid-row:span 2"><img src="images/photo43.jpg" alt="Together 1"/></div>
        <div class="f-photo"><img src="images/photo44.jpg" alt="Together 2"/></div>
        <div class="f-photo"><img src="images/photo45.jpg" alt="Together 3"/></div>
      </div>
    </div>
    <nav class="p-nav">
      <div class="p-dot done"   title="Welcome"></div>
      <div class="p-dot done"   title="Wish"></div>
      <div class="p-dot done"   title="Gallery 1"></div>
      <div class="p-dot done"   title="Gallery 2"></div>
      <div class="p-dot done"   title="Gallery 3"></div>
      <div class="p-dot done"   title="Gallery 4"></div>
      <div class="p-dot done"   title="Gallery 5"></div>
      <div class="p-dot done"   title="Gallery 6"></div>
      <div class="p-dot done"   title="Gallery 7"></div>
      <div class="p-dot done"   title="Gallery 8"></div>
      <div class="p-dot active" title="Friendship"></div>
      <div class="p-dot"        title="Childhood"></div>
      <div class="p-dot"        title="Together"></div>
      <div class="p-dot"        title="Quotes"></div>
      <div class="p-dot"        title="Message"></div>
      <div class="p-dot"        title="Surprise"></div>
    </nav>
  </div>
  <script src="script.js"></script>
</body>
</html>
